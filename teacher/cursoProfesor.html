<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Curso - Profesor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:FILL@0..1" rel="stylesheet">
    <link rel="stylesheet" href="../login/styles.css">
</head>
<body>

<header>
    <h1 id="headerCursoGrupo">Curso / Grupo</h1>
    <p id="bienvenidaProfesor"></p>
    <button onclick="window.location.href='./Panelprofesor.html'">Volver</button>
    <button onclick="cerrarSesionProfesor()">Cerrar Sesión</button>
</header>

<main>
    <section>
        <h2 id="tituloCursoProfesor"></h2>
        <p id="subtituloCursoProfesor"></p>
    </section>

    <section>
        <h2>Estudiantes matriculados</h2>
        <div id="mensajeCursoProfesor" class="admin-mensaje" role="status" aria-live="polite"></div>

        <table border="1" cellpadding="5">
            <thead>
                <tr>
                    <th>Estudiante</th>
                    <th>Usuario</th>
                    <th>Notas</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaEstudiantesCurso"></tbody>
        </table>
    </section>
</main>

<!-- MODAL NOTA -->
<div id="modalNotaBackdrop" class="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalNotaTitle">
        <div class="modal-header">
            <h2 id="modalNotaTitle">Nota</h2>
            <button type="button" id="btnCerrarModalNota" class="icon-btn" aria-label="Cerrar" title="Cerrar">
                <span class="material-symbols-outlined" aria-hidden="true">close</span>
            </button>
        </div>

        <div id="modalNotaMsg" class="admin-mensaje" role="status" aria-live="polite"></div>

        <form id="formNotaProfesor">
            <input type="hidden" id="modalMode" />
            <input type="hidden" id="studentId" />
            <input type="hidden" id="noteId" />

            <p><strong>Estudiante:</strong> <span id="studentLabel"></span></p>

            <div id="existingNoteWrap">
                <label>Nota existente</label>
                <select id="existingNoteSelect"></select>
            </div>

            <label>Actividad</label>
            <input type="text" id="actividadName" placeholder="Ej: Parcial 1" required>

            <label>Nota</label>
            <input type="number" id="nota" min="0" max="10" step="0.1" required>

            <div class="modal-actions">
                <button type="submit" id="btnGuardarNota">Guardar</button>
                <button type="button" id="btnEliminarNota" class="admin-secondary">Eliminar</button>
                <button type="button" id="btnCancelarModal" class="admin-secondary">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script src="/js/login.js"></script>
<script src="/js/teacher/cursoProfesor.js"></script>
</body>
</html>
