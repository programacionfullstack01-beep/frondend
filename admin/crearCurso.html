<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Crear Curso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:FILL@0..1" rel="stylesheet">
    <link rel="stylesheet" href="../login/styles.css">
</head>

<body>
    <header>
        <h1>Crear Curso</h1>
        <p id="bienvenida"></p>
        <button onclick="window.location.href='./panelAdmin.html'">Volver</button>
        <button onclick="cerrarSesion()">Cerrar Sesión</button>
    </header>

    <main>
        <div id="adminMensaje" class="admin-mensaje" role="status" aria-live="polite"></div>

        <section>
            <form id="formCrearCurso">
                <label>Nombre del curso</label>
                <input type="text" id="cursoName" required>

                <label>Descripción</label>
                <input type="text" id="cursoDescription" placeholder="Opcional">

                <button type="submit">Crear curso</button>
            </form>
        </section>
    </main>

    <script src="/js/login.js"></script>
    <script src="/js/admin/panelAdmin.js"></script>
    <script src="/js/admin/adminApi.js"></script>
    <script src="/js/admin/crearCurso.js"></script>
</body>

</html>
