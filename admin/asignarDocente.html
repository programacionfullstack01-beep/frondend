<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Asignar Docente a Curso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:FILL@0..1" rel="stylesheet">
    <link rel="stylesheet" href="../login/styles.css">
</head>

<body>
    <header>
        <h1>Asignar Docente a Curso</h1>
        <p id="bienvenida"></p>
        <button onclick="window.location.href='./panelAdmin.html'">Volver</button>
        <button onclick="cerrarSesion()">Cerrar Sesión</button>
    </header>

    <main>
        <div id="adminMensaje" class="admin-mensaje" role="status" aria-live="polite"></div>

        <section>
            <form id="formAsignarDocente">
                <h2 class="admin-subtitle">Asignar docente a curso (en un grupo)</h2>

                <label>Grupo</label>
                <select id="asignarGroupId" required></select>

                <label>Curso</label>
                <select id="asignarCourseId" required></select>

                <label>Profesor</label>
                <select id="asignarTeacherId" required></select>

                <button type="submit">Asignar</button>
                <button type="button" id="btnRecargarAsignarDocente" class="admin-secondary">Recargar listas</button>
            </form>
        </section>
    </main>

    <script src="/js/login.js"></script>
    <script src="/js/admin/panelAdmin.js"></script>
    <script src="/js/admin/adminApi.js"></script>
    <script src="/js/admin/asignarDocente.js"></script>
</body>

</html>
